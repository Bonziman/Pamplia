<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Pamplia booking screen preview</title>
  <desc id="desc">A stylized booking page with service selection, team member, and available slots.</desc>
  <rect width="1200" height="760" fill="#f6f8fb"/>
  <rect x="96" y="54" width="1008" height="652" rx="24" fill="#ffffff" stroke="#d8deea" stroke-width="3"/>
