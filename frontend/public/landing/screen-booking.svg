  <rect x="646" y="312" width="112" height="46" rx="12" fill="#dbeafe"/>
  <text x="680" y="343" font-family="Verdana, sans-serif" font-size="20" fill="#1d4ed8">09:00</text>
  <rect x="772" y="312" width="112" height="46" rx="12" fill="#dcfce7"/>
  <text x="807" y="343" font-family="Verdana, sans-serif" font-size="20" fill="#15803d">10:30</text>
  <rect x="898" y="312" width="112" height="46" rx="12" fill="#dcfce7"/>
  <text x="934" y="343" font-family="Verdana, sans-serif" font-size="20" fill="#15803d">12:00</text>

  <rect x="646" y="376" width="112" height="46" rx="12" fill="#dcfce7"/>
