  <text x="505" y="92" font-family="Verdana, sans-serif" font-size="22" fill="#e2e8f0">Pamplia Booking</text>

  <text x="146" y="170" font-family="Verdana, sans-serif" font-size="34" fill="#111827">Reservez votre rendez-vous</text>
