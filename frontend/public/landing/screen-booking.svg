  <rect x="772" y="376" width="112" height="46" rx="12" fill="#dbeafe"/>
  <text x="807" y="407" font-family="Verdana, sans-serif" font-size="20" fill="#1d4ed8">16:00</text>
  <rect x="898" y="376" width="112" height="46" rx="12" fill="#e5e7eb"/>
  <text x="935" y="407" font-family="Verdana, sans-serif" font-size="20" fill="#6b7280">18:00</text>

  <text x="646" y="470" font-family="Verdana, sans-serif" font-size="18" fill="#6b7280">Slots alimentes en temps reel depuis le planning equipe.</text>
