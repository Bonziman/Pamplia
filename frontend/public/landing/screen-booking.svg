  <text x="170" y="540" font-family="Verdana, sans-serif" font-size="20" fill="#111827">Coordonnees</text>
  <text x="170" y="575" font-family="Verdana, sans-serif" font-size="18" fill="#4b5563">Nom, telephone et email</text>
  <rect x="170" y="594" width="180" height="34" rx="10" fill="#0f766e"/>
  <text x="196" y="617" font-family="Verdana, sans-serif" font-size="17" fill="#ecfeff">Confirmer</text>

