  <text x="170" y="414" font-family="Verdana, sans-serif" font-size="20" fill="#111827">Specialiste</text>
  <text x="170" y="450" font-family="Verdana, sans-serif" font-size="24" fill="#1d4ed8">Imane (Top Stylist)</text>

